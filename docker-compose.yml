services:
  postgres:
    image: postgres:16-alpine
    container_name: codex-map-postgres
    environment:
      POSTGRES_DB: zhishen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "9002:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zhishen"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    container_name: codex-map-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "9003:7474"
      - "9004:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
